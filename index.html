<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Grudge Court</title>
  <style>
    :root{
      --bg1:#15111f;
      --bg2:#291638;
      --card:#ffffff;
      --ink:#1f1b2e;
      --soft:#7b6a88;
      --pink:#ff4f8b;
      --purple:#7c4dff;
      --gold:#ffd166;
      --green:#2ecc71;
      --red:#ff5c7a;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,79,139,.35), transparent 28%),
        radial-gradient(circle at 80% 5%, rgba(124,77,255,.35), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      overflow:hidden;
    }

    .floating-bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .bubble{
      position:absolute;
      width:14px;
      height:14px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp{
      from{transform:translateY(110vh) scale(.6); opacity:.1}
      35%{opacity:.7}
      to{transform:translateY(-20vh) scale(1.5); opacity:0}
    }

    .app{
      width:min(680px, 100%);
      position:relative;
      z-index:1;
    }

    .card{
      background:rgba(255,255,255,.95);
      border:1px solid rgba(255,255,255,.45);
      border-radius:28px;
      padding:26px;
      box-shadow:0 25px 80px rgba(0,0,0,.35);
      text-align:center;
      backdrop-filter: blur(12px);
      min-height:430px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      animation: pop .35s ease;
    }

    @keyframes pop{
      from{transform:translateY(18px) scale(.97); opacity:0}
      to{transform:translateY(0) scale(1); opacity:1}
    }

    .badge{
      display:inline-flex;
      align-self:center;
      gap:8px;
      align-items:center;
      padding:8px 14px;
      border-radius:999px;
      background:#f3edff;
      color:#6a3cff;
      font-weight:700;
      font-size:13px;
      margin-bottom:14px;
    }

    h1{
      margin:6px 0 10px;
      font-size:clamp(30px, 7vw, 48px);
      letter-spacing:-1px;
      line-height:1.05;
    }

    h2{
      margin:4px 0 12px;
      font-size:clamp(26px, 6vw, 40px);
      line-height:1.08;
    }

    p{
      margin:8px auto;
      color:var(--soft);
      font-size:clamp(17px, 4vw, 20px);
      line-height:1.45;
      max-width:520px;
    }

    .row{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    button{
      border:none;
      border-radius:18px;
      padding:15px 20px;
      min-width:145px;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
      color:white;
      background:linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow:0 12px 26px rgba(124,77,255,.25);
      touch-action:manipulation;
    }

    button:hover{transform:translateY(-2px)}
    button:active{transform:scale(.97)}

    .ghost{
      color:#3f3650;
      background:#f0edf5;
      box-shadow:none;
    }

    .danger{
      background:linear-gradient(135deg, #ff5c7a, #ff9f1c);
    }

    .good{
      background:linear-gradient(135deg, #22c55e, #16a085);
    }

    .small{
      min-width:auto;
      padding:12px 15px;
      font-size:15px;
    }

    .progress{
      width:100%;
      height:12px;
      border-radius:99px;
      background:#eee8f5;
      overflow:hidden;
      margin:22px auto 8px;
      max-width:440px;
    }

    .bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, var(--pink), var(--purple));
      border-radius:99px;
      transition:width .7s ease;
    }

    .jury{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin:24px 0 4px;
    }

    .juror{
      background:#f7f2ff;
      border-radius:18px;
      padding:16px 10px;
      font-weight:800;
      color:#4a385e;
      animation:bob 1.4s ease-in-out infinite;
    }

    .juror:nth-child(2){animation-delay:.15s}
    .juror:nth-child(3){animation-delay:.3s}

    @keyframes bob{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }

    .wheel-wrap{
      margin:18px auto;
      width:min(310px, 82vw);
      height:min(310px, 82vw);
      position:relative;
    }

    .wheel{
      width:100%;
      height:100%;
      border-radius:50%;
      border:10px solid white;
      box-shadow:0 18px 40px rgba(0,0,0,.24);
      background:conic-gradient(
        #ff4f8b 0deg 60deg,
        #ffd166 60deg 120deg,
        #7c4dff 120deg 180deg,
        #2ecc71 180deg 240deg,
        #ff7f50 240deg 300deg,
        #4cc9f0 300deg 360deg
      );
      position:relative;
      transition:transform 4s cubic-bezier(.1,.8,.1,1);
      overflow:hidden;
    }

    .wheel::after{
      content:"";
      position:absolute;
      inset:22%;
      border-radius:50%;
      background:white;
      box-shadow:inset 0 0 0 8px #f1e8ff;
    }

    .wheel-text{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:2;
      font-weight:900;
      color:#20172d;
      font-size:24px;
      text-align:center;
      padding:45px;
    }

    .pointer{
      position:absolute;
      top:-7px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:18px solid transparent;
      border-right:18px solid transparent;
      border-top:36px solid #fff;
      filter:drop-shadow(0 6px 5px rgba(0,0,0,.18));
      z-index:5;
    }

    .maze{
      width:min(430px, 92vw);
      margin:18px auto;
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:6px;
      direction:ltr;
    }

    .cell{
      aspect-ratio:1;
      border-radius:10px;
      background:#efe8f7;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:900;
    }

    .wall{background:#3b2a4b}
    .path{background:#fff}
    .blocked{background:#ffceda}
    .goal{background:#d8ffe7}
    .start{background:#e0d4ff}

    .doors{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .door{
      padding:18px 12px;
      border-radius:18px;
      background:#f7f2ff;
      border:2px solid #eee3ff;
      font-weight:900;
      cursor:pointer;
      transition:.2s;
    }

    .door:hover{transform:translateY(-2px)}
    .door span{
      display:block;
      color:#8a789a;
      font-size:13px;
      margin-top:6px;
    }

    .photo{
      width:min(360px, 90%);
      max-height:380px;
      object-fit:contain;
      border-radius:24px;
      margin:12px auto 18px;
      box-shadow:0 18px 45px rgba(0,0,0,.25);
      background:#fff;
    }

    .shake{
      animation:shake .45s infinite;
    }

    @keyframes shake{
      0%,100%{transform:translateX(0) rotate(0)}
      25%{transform:translateX(-3px) rotate(-1deg)}
      75%{transform:translateX(3px) rotate(1deg)}
    }

    .stats{
      display:grid;
      gap:10px;
      margin:18px auto;
      width:min(430px, 100%);
    }

    .stat{
      background:#f6f0ff;
      border-radius:16px;
      padding:12px;
      text-align:left;
    }

    .stat b{
      display:flex;
      justify-content:space-between;
      margin-bottom:8px;
      color:#30223d;
    }

    .stat-line{
      height:10px;
      background:#e8ddf5;
      border-radius:20px;
      overflow:hidden;
    }

    .stat-fill{
      height:100%;
      border-radius:20px;
      background:linear-gradient(90deg, var(--pink), var(--purple));
    }

    .hearts{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:50;
      overflow:hidden;
    }

    .heart{
      position:absolute;
      top:-30px;
      font-size:24px;
      animation:fall 4s linear forwards;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
      }
    }

    .confetti{
      position:fixed;
      width:10px;
      height:16px;
      top:-20px;
      z-index:60;
      animation:confettiFall 3.2s linear forwards;
    }

    @keyframes confettiFall{
      to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
      }
    }

    .hidden{display:none}

    @media (max-width:520px){
      .card{padding:22px 18px; min-height:520px}
      .jury{grid-template-columns:1fr}
      .doors{grid-template-columns:1fr}
      button{width:100%}
    }
  </style>
</head>
<body>
  <div class="floating-bg" id="floatingBg"></div>
  <div class="hearts" id="hearts"></div>
  <div class="app">
    <main class="card" id="card"></main>
  </div>

  <script>
    const card = document.getElementById("card");
    const hearts = document.getElementById("hearts");
    const floatingBg = document.getElementById("floatingBg");

    const state = {
      q: 0,
      answers: [],
      wheelSpun: false
    };

    const questions = [
      {
        title: "Why are you upset?",
        options: ["I forgot", "Not sure", "Long story"]
      },
      {
        title: "How serious is this?",
        options: ["A little", "Kind of serious", "Very serious"]
      }
    ];

    for(let i=0;i<30;i++){
      const b = document.createElement("span");
      b.className = "bubble";
      b.style.left = Math.random()*100 + "%";
      b.style.animationDuration = (7 + Math.random()*7) + "s";
      b.style.animationDelay = (Math.random()*7) + "s";
      floatingBg.appendChild(b);
    }

    function set(html){
      card.innerHTML = html;
      card.style.animation = "none";
      void card.offsetWidth;
      card.style.animation = "pop .35s ease";
    }

    function clickSound(){
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 520;
        osc.type = "sine";
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
        osc.stop(ctx.currentTime + 0.18);
      }catch(e){}
    }

    function start(){
      clickSound();
      set(`
        <div class="badge">Case #2026</div>
        <h1>The Grudge Court</h1>
        <p>A complaint has been received.</p>
        <p>Let's see what is going on.</p>
        <div class="row">
          <button onclick="showQuestion()">Start</button>
        </div>
      `);
    }

    function showQuestion(){
      clickSound();
      const q = questions[state.q];
      set(`
        <div class="badge">Question ${state.q + 1} of ${questions.length}</div>
        <h2>${q.title}</h2>
        <p>Please choose one answer.</p>
        <div class="row">
          ${q.options.map(o => `<button class="ghost" onclick="answer('${o.replace(/'/g, "\\'")}')">${o}</button>`).join("")}
        </div>
      `);
    }

    function answer(a){
      clickSound();
      state.answers.push(a);
      state.q++;
      if(state.q < questions.length){
        showQuestion();
      }else{
        checking();
      }
    }

    function checking(){
      clickSound();
      set(`
        <div class="badge">Review</div>
        <h2>Checking answers...</h2>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <p id="checkText">Please wait.</p>
      `);

      let width = 0;
      const bar = document.getElementById("bar");
      const text = document.getElementById("checkText");
      const timer = setInterval(() => {
        width += 25;
        bar.style.width = width + "%";
        if(width === 50) text.textContent = "Looking at the details.";
        if(width === 75) text.textContent = "Almost done.";
        if(width >= 100){
          clearInterval(timer);
          setTimeout(jury, 450);
        }
      }, 420);
    }

    function jury(){
      clickSound();
      set(`
        <div class="badge">Jury</div>
        <h2>Done.</h2>
        <p>This situation might be a little overdramatic.</p>
        <div class="jury">
          <div class="juror">🙂<br>Talk</div>
          <div class="juror">😌<br>Fix it</div>
          <div class="juror">🧐<br>No grudge</div>
        </div>
        <p>The jury has made a decision.</p>
        <div class="row">
          <button onclick="wheel()">I disagree</button>
        </div>
      `);
    }

    function wheel(){
      clickSound();
      set(`
        <div class="badge">Luck</div>
        <h2>Let's leave this to luck.</h2>
        <p>Spin the wheel.</p>
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <div class="wheel" id="wheel"></div>
          <div class="wheel-text" id="wheelText">?</div>
        </div>
        <div class="row">
          <button onclick="spinWheel()" id="spinBtn">Spin</button>
          <button class="ghost hidden" id="challengeBtn" onclick="maze()">I still disagree</button>
        </div>
      `);
    }

    function spinWheel(){
      clickSound();
      const wheel = document.getElementById("wheel");
      const spinBtn = document.getElementById("spinBtn");
      const challengeBtn = document.getElementById("challengeBtn");
      const wheelText = document.getElementById("wheelText");
      spinBtn.disabled = true;
      wheelText.textContent = "Spinning...";
      wheel.style.transform = "rotate(1840deg)";
      setTimeout(() => {
        wheelText.innerHTML = "Talk Again<br>❤️";
        spinBtn.classList.add("hidden");
        challengeBtn.classList.remove("hidden");
      }, 4100);
    }

    function maze(){
      clickSound();
      set(`
        <div class="badge">Challenge</div>
        <h2>Complete the challenge.</h2>
        <p>If you still disagree, reach the end of the maze.</p>
        <div class="maze">
          ${[
            "S","p","p","w","p","p","G",
            "w","w","p","w","p","w","p",
            "p","p","p","p","p","w","p",
            "p","w","w","w","p","w","p",
            "p","p","p","w","p","p","p",
            "w","w","p","w","w","w","p",
            "B","p","p","p","p","p","H"
          ].map(c => {
            let cls = c==="w" ? "wall" : c==="S" ? "start" : c==="B" ? "blocked" : c==="H" ? "goal" : c==="G" ? "blocked" : "path";
            let txt = c==="S" ? "▶" : c==="B" ? "🔒" : c==="H" ? "✓" : c==="G" ? "×" : "";
            return `<div class="cell ${cls}">${txt}</div>`;
          }).join("")}
        </div>
        <div class="doors">
          <div class="door" onclick="badPath()">Stay Angry <span>Closed</span></div>
          <div class="door" onclick="goodPath()">Talk Again <span>Open</span></div>
        </div>
      `);
    }

    function badPath(){
      clickSound();
      set(`
        <div class="badge">Closed Path</div>
        <h2>Your choice has been noted.</h2>
        <img class="photo" src="iwantyou.png" alt="I want you">
        <p>But there is something you should see.</p>
        <div class="row">
          <button onclick="badPathTwo()">Continue</button>
        </div>
      `);
    }

    function badPathTwo(){
      clickSound();
      set(`
        <div class="badge">More Info</div>
        <h2>More information has been found.</h2>
        <img class="photo" src="imissyou.jpg" alt="I miss you">
        <p>Please review carefully.</p>
        <div class="row">
          <button class="danger" onclick="badPathThree()">Continue Anyway</button>
        </div>
      `);
    }

    function badPathThree(){
      clickSound();
      set(`
        <div class="badge">Final Review</div>
        <h2>Review Complete</h2>
        <p>It may be time to stop being angry.</p>
        <div class="stats">
          <div class="stat">
            <b><span>Anger Level</span><span>2%</span></b>
            <div class="stat-line"><div class="stat-fill" style="width:2%"></div></div>
          </div>
          <div class="stat">
            <b><span>Missing Each Other</span><span>98%</span></b>
            <div class="stat-line"><div class="stat-fill" style="width:98%"></div></div>
          </div>
        </div>
        <p>This case should be closed.</p>
        <div class="row">
          <button onclick="finale()">Close Case ❤️</button>
        </div>
      `);
    }

    function goodPath(){
      clickSound();
      set(`
        <div class="badge">Good Choice</div>
        <h2>Final Decision</h2>
        <p>This case should be closed.</p>
        <p>Life is too short for this.</p>
        <div class="row">
          <button class="good" onclick="finale()">Close Case ❤️</button>
        </div>
      `);
    }

    function finale(){
      clickSound();
      makeHearts();
      makeConfetti();
      set(`
        <div class="badge">Case Closed</div>
        <h2>Decision Accepted</h2>
        <img class="photo shake" src="result.png" alt="Result">
        <p>Thank you for your cooperation.</p>
        <div class="row">
          <button onclick="location.reload()">Restart</button>
        </div>
      `);
    }

    function makeHearts(){
      for(let i=0;i<45;i++){
        setTimeout(() => {
          const h = document.createElement("div");
          h.className = "heart";
          h.textContent = ["❤️","💗","💕","💖"][Math.floor(Math.random()*4)];
          h.style.left = Math.random()*100 + "vw";
          h.style.animationDuration = (3 + Math.random()*2) + "s";
          hearts.appendChild(h);
          setTimeout(() => h.remove(), 5200);
        }, i*55);
      }
    }

    function makeConfetti(){
      const colors = ["#ff4f8b","#7c4dff","#ffd166","#2ecc71","#4cc9f0"];
      for(let i=0;i<80;i++){
        setTimeout(() => {
          const c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random()*100 + "vw";
          c.style.background = colors[Math.floor(Math.random()*colors.length)];
          c.style.animationDuration = (2.4 + Math.random()*1.6) + "s";
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4200);
        }, i*20);
      }
    }

    start();
  </script>
</body>
</html>
